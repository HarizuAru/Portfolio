<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SensorSync - Hariz Iskandar">
    <title>SensorSync | Hariz Iskandar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background: #0a0a0a; color: #e6edf3; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .card { background: #161b22; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; }
    </style>
</head>
<body>
    <div class="max-w-5xl mx-auto px-4 py-10">
        <a href="../index.html#projects" class="mono text-sm text-gray-400 hover:text-[#00ff88]">← Back to Projects</a>
        <h1 class="mono text-4xl text-[#00ff88] mt-4 mb-3">SensorSync</h1>
        <p class="text-gray-400 mb-8">Sensor data synchronization for real-time aggregation.</p>
        <section class="card p-6 mb-8">
            <h2 class="mono text-xl text-[#00ff88] mb-4">Demo</h2>
            <div class="grid md:grid-cols-2 gap-4">
                <label class="text-sm">Sensor A
                    <input id="a" type="number" value="42" class="w-full mt-1 p-2 rounded bg-black/40 border border-white/10">
                </label>
                <label class="text-sm">Sensor B
                    <input id="b" type="number" value="47" class="w-full mt-1 p-2 rounded bg-black/40 border border-white/10">
                </label>
            </div>
            <button id="sync" class="mono text-sm mt-4 border border-[#00ff88] text-[#00ff88] px-4 py-2 rounded hover:bg-[#00ff88] hover:text-black">Sync Now</button>
            <p id="result" class="mono text-sm mt-4 text-gray-300"></p>
        </section>
    </div>
    <script>
        const a = document.getElementById('a');
        const b = document.getElementById('b');
        const sync = document.getElementById('sync');
        const result = document.getElementById('result');
        sync.addEventListener('click', () => {
            const av = Number(a.value);
            const bv = Number(b.value);
            const merged = ((av + bv) / 2).toFixed(2);
            const delta = Math.abs(av - bv).toFixed(2);
            result.textContent = `Merged value: ${merged} | Drift corrected: ${delta}`;
        });
    </script>
</body>
</html>
