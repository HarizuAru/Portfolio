<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="GridOptima - Hariz Iskandar">
    <title>GridOptima | Hariz Iskandar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background: #0a0a0a; color: #e6edf3; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .card { background: #161b22; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; }
    </style>
</head>
<body>
    <div class="max-w-5xl mx-auto px-4 py-10">
        <a href="../index.html#projects" class="mono text-sm text-gray-400 hover:text-[#00ff88]">← Back to Projects</a>
        <h1 class="mono text-4xl text-[#00ff88] mt-4 mb-3">GridOptima</h1>
        <p class="text-gray-400 mb-8">Grid and topology optimization framework.</p>
        <section class="card p-6 mb-8">
            <h2 class="mono text-xl text-[#00ff88] mb-4">Demo</h2>
            <div class="grid md:grid-cols-2 gap-4">
                <label class="text-sm">Nodes
                    <input id="nodes" type="number" value="32" class="w-full mt-1 p-2 rounded bg-black/40 border border-white/10">
                </label>
                <label class="text-sm">Connections
                    <input id="edges" type="number" value="64" class="w-full mt-1 p-2 rounded bg-black/40 border border-white/10">
                </label>
            </div>
            <button id="calc" class="mono text-sm mt-4 border border-[#00ff88] text-[#00ff88] px-4 py-2 rounded hover:bg-[#00ff88] hover:text-black">Calculate Efficiency</button>
            <p id="efficiency" class="mono text-sm mt-4 text-gray-300"></p>
        </section>
    </div>
    <script>
        const nodes = document.getElementById('nodes');
        const edges = document.getElementById('edges');
        const calc = document.getElementById('calc');
        const efficiency = document.getElementById('efficiency');
        calc.addEventListener('click', () => {
            const n = Math.max(1, Number(nodes.value));
            const e = Math.max(1, Number(edges.value));
            const ratio = e / n;
            const score = Math.max(0, Math.min(100, Math.round((ratio / 4) * 100)));
            efficiency.textContent = `Topology efficiency score: ${score}/100`;
        });
    </script>
</body>
</html>
